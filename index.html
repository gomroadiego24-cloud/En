<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Brenda ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* 🌌 UNIVERSO */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* CONTENIDO */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 30px;
}

h1 {
  font-size: 40px;
  color: #ff4d8d;
  text-shadow: 0 0 20px #ff4d8d;
}

#nombre {
  font-size: 22px;
  border-right: 2px solid white;
  display: inline-block;
}

/* 💖 CORAZÓN CON FOTOS */
.heart-gallery {
  position: absolute;
  top: 345%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}

.heart-shape {
  width: 260px;
  height: 260px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  transform: rotate(-45deg);
}

.heart-shape img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 12px;
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* 💌 CARTA */
#envelope {
  position: fixed;
  bottom: -100%;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 500px;
  background: white;
  color: black;
  border-radius: 20px;
  padding: 20px;
  transition: 1s ease;
  z-index: 5;
}

/* ❤️ CORAZONES */
.heart {
  position: fixed;
  font-size: 18px;
  animation: float 1.2s linear forwards;
}

@keyframes float {
  to { transform: translateY(-200px); opacity: 0; }
}

/* 🔘 BOTÓN */
button {
  position: absolute;
  margin-top: 20px;
  padding: 14px 24px;
  border-radius: 30px;
  border: none;
  background: #ff4d8d;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<div class="container">
  <h1>TE AMO ❤️</h1>
  <div id="nombre"></div>
  <br>

  <button id="btn" onclick="accion()">Revelar mensaje 💌</button>

  <!-- 💖 CORAZÓN CON FOTOS -->
  <div class="heart-gallery">
    <div class="heart-shape">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
      <img src="foto4.jpg">
      <img src="foto5.jpg">
      <img src="foto6.jpg">
      <img src="foto7.jpg">
      <img src="foto8.jpg">
      <img src="foto9.jpg">
    </div>
  </div>
</div>

<!-- 💌 CARTA -->
<div id="envelope">
  <h2>Para MI BEBESOTA 💖</h2>
  <p id="texto"></p>
</div>

<!-- 🎵 MÚSICA -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<button onclick="toggleMusic()" style="position:fixed;bottom:20px;right:20px;">
🎵
</button>

<script>

/* ✍️ NOMBRE */
const nombre = "Brenda Guadalupe 💖";
let i = 0;

function escribir() {
  if (i < nombre.length) {
    document.getElementById("nombre").innerHTML += nombre[i];
    i++;
    setTimeout(escribir, 80);
  }
}
escribir();

/* 💌 MENSAJE */
const mensaje = `Desde que llegaste, todo cambió...
No es exageración… es que contigo todo tiene sentido.
Eres mi paz, mi caos bonito y mi pensamiento favorito.
Y si el universo es infinito…
Eres mi paz, mi lugar seguro,
y mi forma favorita de sentir amor ❤️`;

/* ACCIÓN */
function accion() {
  document.getElementById("envelope").style.bottom = "0";

  let j = 0;
  function escribirCarta() {
    if (j < mensaje.length) {
      document.getElementById("texto").innerHTML += mensaje[j];
      j++;
      setTimeout(escribirCarta, 25);
    }
  }
  escribirCarta();

  explosion();
}

/* ❤️ CORAZONES */
function explosion() {
  for (let i = 0; i < 30; i++) {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";

    h.style.left = window.innerWidth/2 + "px";
    h.style.top = window.innerHeight/2 + "px";

    const x = (Math.random()-0.5)*300;
    const y = (Math.random()-0.5)*300;

    h.animate([
      { transform:"translate(0,0)", opacity:1 },
      { transform:`translate(${x}px,${y}px)`, opacity:0 }
    ], { duration:1200 });

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

/* 🎵 MÚSICA */
function toggleMusic() {
  const music = document.getElementById("music");
  music.paused ? music.play() : music.pause();
}

/* 🌌 UNIVERSO */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5,
    s: Math.random()*0.5
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.s;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

draw();

/* 🔘 BOTÓN CON VIDA */
const btn = document.getElementById("btn");

btn.addEventListener("mouseover", () => {
  const x = (Math.random()-0.5)*80;
  const y = (Math.random()-0.5)*80;

  btn.style.transform = `translate(${x}px,${y}px)`;
});

/* 🎵 FIX MOBILE */
document.addEventListener("touchstart", () => {});
</script>

</body>
</html>
